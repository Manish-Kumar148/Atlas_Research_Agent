services:
  # 1. FastAPI Backend (Free Web Service)
  - type: web
    name: atlas-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Prompts you to paste your Supabase connection string during setup
      - key: DATABASE_URL
        sync: false
        placeholder: "Paste Supabase URI (e.g. postgresql+asyncpg://postgres.xxx:[pass]@aws-xxx.pooler.supabase.com:6543/postgres)"
      
      # Prompts you to paste your Upstash Redis connection string during setup
      - key: REDIS_URL
        sync: false
        placeholder: "Paste Upstash connection URI (e.g. rediss://default:xxx@xxx.upstash.io:6379)"
      
      # Runs ChromaDB in-process (completely free!)
      - key: CHROMA_HOST
        value: local
      
      - key: ENVIRONMENT
        value: production
      - key: AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: anthropic/claude-sonnet-4
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1

  # 2. Next.js Frontend (Free Web Service)
  - type: web
    name: atlas-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://atlas-backend.onrender.com
        sync: false
