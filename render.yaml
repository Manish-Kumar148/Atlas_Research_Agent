services:
  # 1. Redis Session Cache
  - type: redis
    name: atlas-redis
    ipAllowList: [] # internal access only

  # 2. ChromaDB Vector Memory (Private Service)
  - type: privateService
    name: atlas-chromadb
    env: docker
    dockerImage: chromadb/chroma:latest
    envVars:
      - key: IS_PERSISTENT
        value: "TRUE"
      - key: ANONYMIZED_TELEMETRY
        value: "FALSE"

  # 3. FastAPI Backend
  - type: web
    name: atlas-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: atlas-redis
          property: connectionString
      - key: CHROMA_HOST
        fromService:
          type: privateService
          name: atlas-chromadb
          property: host
      - key: CHROMA_PORT
        value: "8000"
      - key: ENVIRONMENT
        value: production
      - key: AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: anthropic/claude-sonnet-4
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      # Note: User must define OPENROUTER_API_KEY and TAVILY_API_KEY in Render Dashboard if not using client-side keys

  # 4. Next.js Frontend
  - type: web
    name: atlas-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: atlas-backend
          property: url

databases:
  # 5. PostgreSQL Database
  - name: atlas-db
    databaseName: atlas
    user: postgres
